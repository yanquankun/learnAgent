<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>博客 AI 助手 · 测试页</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f5f6f8; display: flex; justify-content: center; min-height: 100vh; }
  .app { width: min(680px, 100vw); display: flex; flex-direction: column; height: 100vh; background: #fff; box-shadow: 0 0 24px rgba(0,0,0,.06); }
  header { padding: 14px 20px; border-bottom: 1px solid #eee; font-weight: 600; }
  header small { color: #999; font-weight: 400; margin-left: 8px; }
  #log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
  .user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
  .bot { align-self: flex-start; background: #f1f3f5; border-bottom-left-radius: 4px; }
  .cards { align-self: flex-start; max-width: 85%; display: flex; flex-direction: column; gap: 6px; }
  .card { font-size: 13px; padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fafbfc; }
  .card a { color: #2563eb; text-decoration: none; }
  .card .tag { color: #999; margin-right: 6px; }
  form { display: flex; gap: 8px; padding: 14px 20px; border-top: 1px solid #eee; }
  input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
  input:focus { border-color: #2563eb; }
  button { padding: 10px 18px; border: 0; border-radius: 10px; background: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
  button:disabled { opacity: .5; }
</style>
</head>
<body>
<div class="app">
  <header>博客 AI 助手 <small>SSE 流式测试页（前端接入可参照本页代码）</small></header>
  <div id="log"></div>
  <form id="form">
    <input id="input" placeholder="问点博客里的内容，比如：useEffect 为什么执行两次？" autocomplete="off" />
    <button id="send">发送</button>
  </form>
</div>
<script>
const log = document.getElementById("log");
const form = document.getElementById("form");
const input = document.getElementById("input");
const send = document.getElementById("send");
// 简单会话 id：刷新页面前的提问共享上下文（多轮对话）
const sessionId = "web-" + Math.random().toString(36).slice(2, 10);

function addMsg(cls, text) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function addCards(done) {
  if (!done.sources.length && !done.recommendedArticles.length) return;
  const wrap = document.createElement("div");
  wrap.className = "cards";
  for (const s of done.sources) {
    wrap.insertAdjacentHTML("beforeend",
      `<div class="card"><span class="tag">来源 ${s.score}</span><a href="${s.url}" target="_blank">${s.title}</a></div>`);
  }
  for (const r of done.recommendedArticles) {
    wrap.insertAdjacentHTML("beforeend",
      `<div class="card"><span class="tag">推荐</span><a href="${r.url}" target="_blank">${r.title}</a></div>`);
  }
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;
  addMsg("user", question);
  input.value = "";
  send.disabled = true;
  const botDiv = addMsg("bot", "…");

  try {
    // 注意：POST + SSE 用 fetch 读流（EventSource 只支持 GET）
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, sessionId, stream: true }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "", answer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      // SSE 事件以空行分隔；可能一次到达多条，逐条解析
      const events = buffer.split("\n\n");
      buffer = events.pop();
      for (const evt of events) {
        if (!evt.startsWith("data: ")) continue;
        const data = JSON.parse(evt.slice(6));
        if (data.type === "delta") {
          answer += data.text;
          botDiv.textContent = answer;        // 打字机效果
          log.scrollTop = log.scrollHeight;
        } else if (data.type === "done") {
          addCards(data);                      // 来源与推荐卡片
        }
      }
    }
  } catch (err) {
    botDiv.textContent = "请求失败：" + err.message;
  } finally {
    send.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
