# Nginx HTTPS 反代配置（适配泛域名证书）
# 放到服务器 /etc/nginx/conf.d/blog-agent.conf，把 agent.example.com 换成你的子域名
#
#   nginx -t && systemctl reload nginx     # 检查并重载

# HTTP 全部跳转 HTTPS
server {
    listen 80;
    server_name agent.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name agent.example.com;

    # 泛域名证书路径（按你的实际路径修改，阿里云下载的 *.example.com 证书）
    ssl_certificate     /etc/nginx/ssl/example.com.pem;
    ssl_certificate_key /etc/nginx/ssl/example.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # GitHub webhook payload 可能较大
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ===== SSE 三件套：少一条流式就会被「攒成一坨」=====
        proxy_http_version 1.1;        # 1.0 不支持 chunked
        proxy_set_header Connection ""; # 不透传 close，保持长连接
        proxy_buffering off;            # 关缓冲：每个事件立即转发给浏览器

        # LLM 生成可能超过默认 60s
        proxy_read_timeout 300s;
    }

    # 监控面板不暴露公网：需要时用 SSH 隧道访问
    #   ssh -L 3000:localhost:3000 user@服务器IP  ->  浏览器开 localhost:3000
}
